server:
  port: 8083

spring:
  application:
    name: HISTORY-SERVICE

  datasource:
    url: jdbc:mysql://mysql:3306/quantitydb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/
    register-with-eureka: true
    fetch-registry: true